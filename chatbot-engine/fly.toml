# fly.toml — travel-chatbot-engine
app = 'travel-chatbot-engine'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  DEBUG       = 'false'
  OPENAI_MODEL = 'gpt-4o-mini'

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = 'requests'
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval     = '30s'
    timeout      = '5s'
    grace_period = '15s'
    method       = 'GET'
    path         = '/chat/health'

[[vm]]
  memory = '512mb'
  cpus   = 1
